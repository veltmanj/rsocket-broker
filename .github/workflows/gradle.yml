name: Java CI with Gradle

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

    steps:
      - uses: actions/checkout@v5
      - name: Check out rsocket-broker-client
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsocket-broker-client
          ref: main
          path: rsocket-broker-client
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: "gradle"
      - name: Publish rsocket-broker-client to Maven Local
        run: ./gradlew publishToMavenLocal --no-daemon --stacktrace
        working-directory: rsocket-broker-client
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew -PversionSuffix="-SNAPSHOT" -PbuildNumber="${buildNumber}" build publishMavenPublicationToGitHubPackagesRepository --no-daemon --stacktrace
        env:
          buildNumber: ${{ github.run_number }}
